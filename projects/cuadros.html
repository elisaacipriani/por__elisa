<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Intersecciones - archivo visual de POR ELISA.">
    <title>POR ELISA - Intersecciones</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html" aria-label="POR ELISA">POR ELISA</a>
      <nav class="site-nav" aria-label="Principal">
        <a href="../index.html#archivo" data-i18n="nav.archive">[archivo]</a>
        <a href="../index.html#bio" data-i18n="nav.bio">[bio]</a>
        <a href="../index.html#contacto" data-i18n="nav.contact">[contacto]</a>
      </nav>
      <div class="language-switch" aria-label="Idioma">
        <button type="button" data-set-lang="es" aria-pressed="true">ES</button>
        <button type="button" data-set-lang="en" aria-pressed="false">EN</button>
      </div>
    </header>

    <main class="project-page">
      <a class="back-link" href="../index.html#archivo" data-i18n="project.back">[volver al archivo]</a>

      <section class="project-hero" aria-labelledby="project-title">
        <div>
          <p class="project-number">[04]</p>
          <h1 id="project-title" data-i18n="project.painting.title">Intersecciones</h1>
        </div>
        <dl class="project-data">
          <div>
            <dt data-i18n="label.section">Sección</dt>
            <dd data-i18n="project.painting.section">Micro</dd>
          </div>
          <div>
            <dt data-i18n="label.material">Material</dt>
            <dd data-i18n="project.painting.material">Cuadros</dd>
          </div>
        </dl>
      </section>

      <section class="project-body project-body-stacked">
        <div class="project-text">
          <p data-i18n="project.painting.text">
            Una selección de obras y registros donde la imagen funciona como superficie,
            gesto y composición.
          </p>
        </div>
        <div class="media-grid media-grid-three" aria-label="Galeria">
          <figure class="media-item is-portrait" data-mark="[obra / 01]">
            <img src="../assets/images/cuadros/1.jpg" alt="Registro de obra." loading="lazy">
          </figure>
          <figure class="media-item is-portrait" data-mark="[obra / 02]">
            <img src="../assets/images/cuadros/2.jpg" alt="Registro de obra." loading="lazy">
          </figure>
          <figure class="media-item is-portrait" data-mark="[obra / 03]">
            <img src="../assets/images/cuadros/3.jpg" alt="Registro de obra." loading="lazy">
          </figure>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>POR ELISA</span>
      <span>Buenos Aires, Argentina</span>
    </footer>

    <script src="../assets/js/site.js"></script>
  </body>
</html>
